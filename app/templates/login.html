{% extends "base.html" %}

{% block title %}Login - CloserNotes{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-8rem)] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
        <!-- Logo and Title -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-bb-blue rounded-2xl mb-4">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Welcome back</h1>
            <p class="mt-2 text-gray-600 dark:text-gray-400">Sign in to your CloserNotes account</p>
        </div>

        <!-- Login Form -->
        <div class="card">
            <form method="POST" action="{{ url_for('auth.login') }}{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}" class="space-y-6">
                <div>
                    <label for="email" class="label">Email address</label>
                    <input type="email" id="email" name="email" required autofocus
                           value="{{ email if email else '' }}"
                           class="input-field w-full"
                           placeholder="you@example.com">
                </div>

                <div>
                    <label for="password" class="label">Password</label>
                    <input type="password" id="password" name="password" required
                           class="input-field w-full"
                           placeholder="Enter your password">
                </div>

                <button type="submit" class="btn-primary w-full py-3 text-base">
                    Sign in
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-sm text-gray-600 dark:text-gray-400">
                    Don't have an account?
                    <a href="{{ url_for('auth.signup') }}" class="font-medium text-bb-blue hover:text-bb-blue/80 transition-colors">
                        Sign up
                    </a>
                </p>
            </div>
        </div>

    </div>
</div>
{% endblock %}
